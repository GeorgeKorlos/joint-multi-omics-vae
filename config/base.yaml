project:
  name: p2-multiomics-vae
  kegg_release: "118.0"       # must match P5 — do not bump without flagging P5

seed: 42

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_embeddings: data/embeddings
  logs: logs
  reports: reports
  raw_transcriptomics: data/raw/OmicsExpressionProteinCodingGenesTPMLogp1.csv
  raw_metabolomics: data/raw/CCLE_metabolomics_20190502.csv

data:
  n_paired: 912    
  n_genes: 19205         
  n_metabolites: 225

split:
  train: 0.8
  val: 0.1
  test: 0.1

embedding:
  dim: 128
  normalization: L2    
  
qc:
  outlier_sd: 3
  min_paired: 850 # applied at export — output contract, do not change