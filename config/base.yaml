data:
  n_paired: null        # filled Day 5
  n_genes: null         # filled Day 5
  n_metabolites: null   # filled Day 5 (expect ~225)

split:
  train: 0.8
  val: 0.1
  test: 0.1

embedding:
  dim: 128
  normalization: L2     # applied at export — output contract, do not change